version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directories: ["/Node/apps/admin-frontend", "/Node/apps/user-frontend"]
    schedule:
      interval: "weekly"
    versioning-strategy: "increase-if-necessary"
  - package-ecosystem: "docker"
    directories: ["/", "/Node/", "/Python"]
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker-compose"
    directories: ["/"]
    schedule:
      interval: "weekly"
