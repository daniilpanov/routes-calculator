name: project-build

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: "Docker image tag (optional). If set, a git tag is created and images are also pushed with this tag."
        required: false
        type: string
      is_stable:
        description: "Mark as stable (pushes as latest-stable instead of latest)"
        type: boolean
        default: false
      deploy:
        description: "Deploy to production after build (requires secrets SERVER_ADDR, SERVER_USER, SERVER_SSH_KEY and PROJECT_DIR)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set primary tag
        id: set-tag
        run: |
          if [ "${{ inputs.is_stable }}" = "true" ]; then
            echo "TAG=latest-stable" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/bake-action@v5
        env:
          TAG: ${{ steps.set-tag.outputs.TAG }}
        with:
          files: docker-bake.hcl
          push: true
          set: |
            *.cache-to=type=gha,mode=max
            *.cache-from=type=gha

      - name: Push additional docker tag
        if: ${{ inputs.docker_tag != '' }}
        run: |
          for img in calculator-python-apps calculator-db-migration calculator-reverseproxy; do
            docker tag danielgreen1806/$img:${{ steps.set-tag.outputs.TAG }} danielgreen1806/$img:${{ inputs.docker_tag }}
            docker push danielgreen1806/$img:${{ inputs.docker_tag }}
          done

      - name: Create and push git tag
        if: ${{ inputs.docker_tag != '' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ inputs.docker_tag }}
          git push origin ${{ inputs.docker_tag }}

  deploy:
    if: ${{ inputs.deploy == 'true' }}
    needs: build
    uses: ./.github/workflows/project-deploy.yml
    with:
      docker_tag: ${{ inputs.docker_tag }}
    secrets: inherit
