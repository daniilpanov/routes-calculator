name: project-deploy

on:
  workflow_call:
    inputs:
      docker_tag:
        description: "Docker image and git tag to deploy"
        required: false
        type: string
        default: ""
      tag_message:
        description: "Optional message for the git tag (annotated tag)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      docker_tag:
        description: "Docker image and git tag to deploy (optional)"
        required: false
        type: string
      tag_message:
        description: "Optional message for the git tag (annotated tag)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Validate required secrets and variables
        run: |
          errors=()
          if [ -z "${{ secrets.SERVER_ADDR }}" ]; then errors+=("SERVER_ADDR"); fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then errors+=("SERVER_USER"); fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then errors+=("SERVER_SSH_KEY"); fi
          if [ -z "${{ secrets.PROJECT_DIR }}" ]; then errors+=("PROJECT_DIR"); fi
          if [ ${#errors[@]} -gt 0 ]; then
            echo "::error::Missing required configuration: ${errors[*]}"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_ADDR }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd "${{ secrets.PROJECT_DIR }}"
            ./scripts/prod-update.sh ${{ github.ref_name }} ${{ inputs.docker_tag }} ${{ inputs.docker_tag }} "${{ inputs.tag_message }}"
